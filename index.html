    color: #F9FAFF;
  }
  #unityContainer {
    width: 100%;
    height: 100%;
    position: relative;
  }
  #loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    opacity: 0.7;
  }
  @keyframes bob {
    0% { transform: translate(0,0); }
    50% { transform: translate(0,10.5px); }
    100% { transform: translate(0,0); }
  }
  #loader svg {
    animation: bob 800ms linear infinite;
    height: 50px;
    width: 46px;
    fill: currentColor;
  }
</style>
